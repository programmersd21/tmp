name: Replace old username in all repos (personal + org)

on:
  workflow_dispatch:

jobs:
  replace-username:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Get personal repos
        run: |
          curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
          "https://api.github.com/user/repos?per_page=100" > personal.json

      - name: Get organizations
        run: |
          curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
          "https://api.github.com/user/orgs" > orgs.json

      - name: Get org repos
        run: |
          > org_repos.json
          for org in $(jq -r '.[].login' orgs.json); do
            curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/orgs/$org/repos?per_page=100" >> org_repos.json
          done

      - name: Merge repo lists
        run: |
          cat personal.json org_repos.json | jq -r '.[].clone_url' > repos.txt

      - name: Process repositories
        run: |
          mkdir repos

          while read repo; do
            echo "Processing $repo"

            git clone "$repo" repos/temp
            cd repos/temp

            if grep -R "pro-grammer-SD" .; then
              grep -rl "pro-grammer-SD" . | xargs sed -i 's/pro-grammer-SD/programmersd/g'

              git config user.name "github-actions"
              git config user.email "actions@github.com"

              git add .
              git commit -m "chore: update username references after GitHub rename"
              git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/$(git config --get remote.origin.url | sed 's/.*github.com\///')
            fi

            cd ../..
            rm -rf repos/temp

          done < repos.txt
