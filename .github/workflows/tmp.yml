name: Replace old username in all repos (personal + org)

on:
  workflow_dispatch:

jobs:
  replace-username:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Collect all repo full_names
        run: |
          curl -fsSL -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/user/repos?per_page=100&type=owner" \
            | jq -r '.[].full_name' > repo_names.txt

          curl -fsSL -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/user/orgs" \
            | jq -r '.[].login' \
          | while read -r org; do
              curl -fsSL -H "Authorization: token ${{ secrets.GH_PAT }}" \
                "https://api.github.com/orgs/${org}/repos?per_page=100" \
                | jq -r '.[].full_name' >> repo_names.txt
            done

          sort -u repo_names.txt -o repo_names.txt

          echo "=== Repos to process ==="
          cat repo_names.txt
          echo "Total: $(wc -l < repo_names.txt)"

      - name: Process repositories
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p workdir
          CHANGED=0
          SKIPPED=0
          FAILED=0

          while IFS= read -r full_name; do
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📦 Processing: $full_name"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            auth_url="https://x-access-token:${GH_PAT}@github.com/${full_name}.git"

            if ! git clone --depth=1 "$auth_url" workdir/temp 2>&1; then
              echo "⚠️  Clone failed for $full_name — skipping"
              FAILED=$((FAILED + 1))
              rm -rf workdir/temp
              continue
            fi

            cd workdir/temp

            if grep -rql --exclude-dir=.git "programmersd" .; then
              echo "🔍 Found references — replacing..."

              grep -rl --exclude-dir=.git "programmersd" . \
                | xargs sed -i 's/programmersd/programmersd21/g'

              git config user.name  "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"

              git add -A
              git commit -m "chore: update username references after GitHub rename"

              if git push origin HEAD; then
                echo "✅ Pushed $full_name"
                CHANGED=$((CHANGED + 1))
              else
                echo "❌ Push failed for $full_name"
                FAILED=$((FAILED + 1))
              fi
            else
              echo "✔️  No references found — skipping"
              SKIPPED=$((SKIPPED + 1))
            fi

            cd ../..
            rm -rf workdir/temp

          done < repo_names.txt

          echo ""
          echo "══════════════════════════════"
          echo "  Summary"
          echo "  ✅ Changed : $CHANGED"
          echo "  ⏭️  Skipped : $SKIPPED"
          echo "  ❌ Failed  : $FAILED"
          echo "══════════════════════════════"
